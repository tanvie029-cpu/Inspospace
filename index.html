<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InspoSpace</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <div class="logo-navbar">
            <div class="logo-container">
               <div id="logo">
                <div id="sparkle"><i class="fa-solid fa-sparkles"></i></div>
               </div>   
            </div>
            <div id="name">InspoSpace</div>
        </div>
        <div class="quote-navbar">
        <div id="heart">
          <i class="fa-regular fa-heart"></i>
        </div>
        <div id="notification">
              <i class="fa-solid fa-circle-check"></i>Quote saved to favourite!
        </div>
        </div>
    </div>

    <div class="app">
  <div class="inspo-box">
    <p id="inspo">Your inspirational quote will appear here</p>
    <p id="author">-Swami Vivekanand</p>
    <div class="buttons">
      <button id="new-quote"><i class="fa-solid fa-pen-nib"></i>New Quote</button>
      <button id="save-quote"><i class="fa-regular fa-bookmark"></i>Save Quote</button>
    </div>
  </div>

  <div class="saved-quotes" id="saved-quotes">
    <!-- Saved quotes will appear here -->
  </div>
</div>
<div id="sidebar" class="sidebar">
  <h2>Saved Quotes ❤️</h2>
  <div id="saved-list"></div>
</div>


<script src="script.js"></script>    
</body>
</html>
